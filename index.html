<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Health Check-up Medical Record</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* CSS หลัก */
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --accent:#00d4aa;--accent2:#00a882;--accent-bg:rgba(0,212,170,.12);
  --red:#ff4757;--red-bg:rgba(255,71,87,.12);
  --yellow:#ffd700;--yellow-bg:rgba(255,215,0,.1);
  --mono:'JetBrains Mono',monospace;
  --sans:'IBM Plex Sans Thai',sans-serif;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;line-height:1.6}
.shell{max-width:720px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0}
.hdr-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.14em;text-transform:uppercase}
.hdr-date{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--mono)}
#view-form,#view-output{display:block}
.sec{margin-bottom:1.75rem}
.sec-lbl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:.875rem;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.lbl{font-size:10px;color:var(--text3);display:block;margin-bottom:4px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.iw{margin-bottom:.75rem}
input[type=text],textarea{
  width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:8px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus,textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.pill{
  border:0.5px solid var(--border2);border-radius:999px;padding:5px 14px;font-size:12px;
  cursor:pointer;font-family:var(--mono);background:var(--bg3);color:var(--text2);
  transition:all .15s;user-select:none;
}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,212,170,.15)}
.gen-btn{
  width:100%;background:var(--accent);border:none;border-radius:var(--r);
  padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;color:#000;
  font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;
  transition:all .15s;margin-top:.5rem;
}
.gen-btn:hover{background:var(--accent2);box-shadow:0 0 20px rgba(0,212,170,.25)}
.out-panel{display:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem}
.out-panel.active{display:block}
.out-pre{font-family:var(--sans);font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.out-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.copy-btn,.back-btn,.new-btn{
  background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:7px 16px;font-size:10px;cursor:pointer;color:var(--text2);font-family:var(--mono);
  transition:all .15s;letter-spacing:.08em;text-transform:uppercase;
}
.copy-btn:hover,.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.ok{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.new-btn:hover{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-dot"></div>
    <div class="hdr-title">Check-up Note Template</div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="view-form">
    
    <!-- 1. Subjective & History -->
    <div class="sec">
      <div class="sec-lbl">Chief Complaint & History</div>
      <div class="iw">
        <label class="lbl">Chief Complaint (CC)</label>
        <input type="text" id="in-cc" placeholder="มาตรวจสุขภาพประจำปี / ไม่มีอาการผิดปกติ" value="มาตรวจสุขภาพประจำปี / ไม่มีอาการผิดปกติ (Asymptomatic)"/>
      </div>
      
      <div class="iw">
        <label class="lbl">Past Medical History (PMH)</label>
        <div class="pill-row" id="row-pmh"></div>
        <input type="text" id="in-pmh" placeholder="ระบุโรคประจำตัวและระยะเวลา" style="display:none;margin-top:4px"/>
      </div>
    </div>

    <!-- 2. Family History -->
    <div class="sec">
      <div class="sec-lbl">Family History (FH)</div>
      <div class="pill-row" id="row-fh"></div>
      <div class="g2">
        <input type="text" id="in-fh-cancer" placeholder="ระบุชนิดมะเร็ง..." style="display:none"/>
        <input type="text" id="in-fh-other" placeholder="ระบุโรคอื่นๆ..." style="display:none"/>
      </div>
    </div>

    <!-- 3. Social & Lifestyle -->
    <div class="sec">
      <div class="sec-lbl">Social & Lifestyle History (SH)</div>
      <div class="iw">
        <label class="lbl">Smoking</label>
        <div class="pill-row" id="row-smoke"></div>
        <input type="text" id="in-smoke" placeholder="รายละเอียด (เช่น Quit 5 yrs หรือ 10 Cigs/day)" style="display:none;margin-top:4px"/>
      </div>
      <div class="iw">
        <label class="lbl">Alcohol</label>
        <div class="pill-row" id="row-alc"></div>
        <input type="text" id="in-alc" placeholder="รายละเอียด (เช่น 2 drinks/week)" style="display:none;margin-top:4px"/>
      </div>
      <div class="iw">
        <label class="lbl">Exercise</label>
        <div class="pill-row" id="row-ex"></div>
      </div>
      <div class="iw">
        <label class="lbl">Diet & Sleep</label>
        <input type="text" id="in-diet" placeholder="ระบุการรับประทานอาหารและการนอนหลับ"/>
      </div>
      <div class="iw">
        <label class="lbl">Current Medications / Supplements</label>
        <input type="text" id="in-meds" placeholder="ยาและอาหารเสริมที่ทานประจำ"/>
      </div>
      <div class="iw">
        <label class="lbl">Allergies</label>
        <div class="pill-row" id="row-allergy"></div>
        <input type="text" id="in-allergy" placeholder="ระบุชื่อยาที่แพ้" style="display:none;margin-top:4px"/>
      </div>
    </div>

    <!-- 4. Investigation Results -->
    <div class="sec">
      <div class="sec-lbl">Investigation Results</div>
      
      <!-- CBC -->
      <div class="iw">
        <label class="lbl">CBC</label>
        <div class="g4">
          <input type="text" id="lab-hb" placeholder="Hb"/>
          <input type="text" id="lab-wbc" placeholder="WBC"/>
          <input type="text" id="lab-eos" placeholder="Eosinophil"/>
          <input type="text" id="lab-plt" placeholder="Platelet"/>
        </div>
      </div>

      <!-- FBS & Uric -->
      <div class="g2">
        <div class="iw">
          <label class="lbl">Fasting Blood Sugar / HbA1c</label>
          <input type="text" id="lab-fbs"/>
        </div>
        <div class="iw">
          <label class="lbl">Uric Acid</label>
          <input type="text" id="lab-uric"/>
        </div>
      </div>

      <!-- Lipids -->
      <div class="iw">
        <label class="lbl">Lipid Profile</label>
        <div class="g4">
          <input type="text" id="lab-chol" placeholder="Chol"/>
          <input type="text" id="lab-tg" placeholder="TG"/>
          <input type="text" id="lab-hdl" placeholder="HDL"/>
          <input type="text" id="lab-ldl" placeholder="LDL"/>
        </div>
      </div>

      <!-- Renal & Liver Function -->
      <div class="iw">
        <label class="lbl">Renal Function (Kidney)</label>
        <div class="g3">
          <input type="text" id="lab-bun" placeholder="BUN"/>
          <input type="text" id="lab-cr" placeholder="Cr"/>
          <input type="text" id="lab-egfr" placeholder="eGFR"/>
        </div>
      </div>
      
      <div class="iw">
        <label class="lbl">Liver Function</label>
        <div class="g3">
          <input type="text" id="lab-ast" placeholder="AST"/>
          <input type="text" id="lab-alt" placeholder="ALT"/>
          <input type="text" id="lab-alp" placeholder="ALP"/>
        </div>
      </div>

      <!-- Urine Analysis -->
      <div class="iw">
        <label class="lbl">Urine Examination</label>
        <div class="g4">
          <input type="text" id="lab-upro" placeholder="Protein"/>
          <input type="text" id="lab-uglu" placeholder="Glucose"/>
          <input type="text" id="lab-uwbc" placeholder="WBC"/>
          <input type="text" id="lab-urbc" placeholder="RBC"/>
        </div>
      </div>
      
      <!-- Imaging & Special Tests Selection -->
      <div class="iw">
        <label class="lbl">Imaging & Special Tests (เลือกหัวข้อที่จะกรอก)</label>
        <div class="pill-row" id="row-img-sel"></div>
        <div id="img-inputs-container"></div>
      </div>
    </div>

    <!-- 5. Assessment -->
    <div class="sec">
      <div class="sec-lbl">Assessment</div>
      
      <div class="iw">
        <label class="lbl">Common Problems Presets (กดเพื่อเพิ่มลงใน Assessment)</label>
        <div class="pill-row" id="row-as-presets"></div>
      </div>

      <div class="iw">
        <label class="lbl">1. Overall Status</label>
        <input type="text" id="as-overall" placeholder="e.g., Healthy adult"/>
      </div>
      <div class="iw">
        <label class="lbl">2. New Findings (พิมพ์เพิ่มเติม)</label>
        <div style="display:flex;gap:10px">
          <button class="pill" id="btn-nf" onclick="toggleActive(this)">Select</button>
          <input type="text" id="as-nf" placeholder="ระบุการค้นพบใหม่ที่ไม่มีใน preset..." style="flex:1"/>
        </div>
      </div>
      <div class="iw">
        <label class="lbl">3. Status of Existing PMH</label>
        <div style="display:flex;gap:10px">
          <button class="pill" id="btn-spmh" onclick="toggleActive(this)">Select</button>
          <input type="text" id="as-spmh" placeholder="e.g., Well-controlled HTN" style="flex:1"/>
        </div>
      </div>
      <div class="iw">
        <label class="lbl">4. Risk Stratification</label>
        <input type="text" id="as-risk" placeholder="e.g., High cardiovascular risk..."/>
      </div>
    </div>

    <!-- 6. Plan -->
    <div class="sec">
      <div class="sec-lbl">Plan</div>
      <div class="iw">
        <label class="lbl">Lifestyle Modification</label>
        <div class="pill-row" id="row-life"></div>
      </div>
      <div class="iw">
        <label class="lbl">Further Investigations</label>
        <input type="text" id="pl-inv" placeholder="การตรวจเพิ่มเติม..."/>
      </div>
      <div class="iw">
        <label class="lbl">Follow-up (F/U)</label>
        <div style="margin-bottom:6px">
          <button class="pill" id="btn-fu1" onclick="toggleActive(this)">Routine Annual Check-up next year</button>
        </div>
        <div style="display:flex;gap:10px">
          <button class="pill" id="btn-fu2" onclick="toggleActive(this)">F/U for abnormal results in:</button>
          <input type="text" id="pl-fu" placeholder="___ Weeks/Months" style="flex:1"/>
        </div>
      </div>
    </div>

    <button class="gen-btn" type="button" onclick="generateOutput()">Generate Record</button>
  </div>

  <!-- OUTPUT VIEW -->
  <div id="view-output" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.12em;text-transform:uppercase">Medical Record Output</span>
    </div>
    <div class="out-panel active" id="out-panel">
      <pre class="out-pre" id="out-text"></pre>
      <div class="out-actions">
        <button class="copy-btn" onclick="copyOutput(this)">COPY TEXT</button>
        <button class="back-btn" onclick="showForm()">← แก้ไขข้อมูล</button>
        <button class="new-btn" style="margin-left:auto" onclick="location.reload()">+ CLEAR FORM</button>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('th-TH', {year:'numeric',month:'short',day:'numeric'});

// State management variables
let state = {
  pmh: 'none',
  fh: { dm: false, htn: false, cad: false, cancer: false, other: false },
  smoke: 'never',
  alc: 'none',
  ex: 'none',
  allergy: 'none',
  life: { diet: false, ex: false, weight: false },
  img: {},
  assessPresets: new Set()
};

const IMG_LIST = ['CXR', 'US abdomen', 'MMG', 'CT Calcium score', 'BMD', 'ABI', 'EKG', 'EST', 'Fibroscan'];
IMG_LIST.forEach(k => state.img[k] = false);

const ASSESS_PRESETS = [
  'Dyslipidemia (LDL สูง)', 'Hypertriglyceridemia', 'IFG', 'DM', 
  'Hyperuricemia / Gout', 'Obesity / Overweight / Metabolic Syndrome', 
  'Fatty Liver (NAFLD / MASLD)', 'Elevated Liver Enzymes', 'Microscopic Hematuria', 
  'Proteinuria', 'Asymptomatic Bacteriuria', 'Anemia', 'Eosinophilia', 'Leukopenia', 'Abnormal ECG'
];

// Toggle general active class
function toggleActive(btn) { btn.classList.toggle('sel'); }

// UI Builders
function renderRadioGroup(containerId, options, activeVal, callback) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill' + (activeVal === opt.val ? ' sel' : '');
    btn.textContent = opt.label;
    btn.onclick = () => callback(opt.val);
    c.appendChild(btn);
  });
}

function renderCheckboxGroup(containerId, options, stateObj, callback) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill' + (stateObj[opt.val] ? ' sel' : '');
    btn.textContent = opt.label;
    btn.onclick = () => {
      stateObj[opt.val] = !stateObj[opt.val];
      callback();
    };
    c.appendChild(btn);
  });
}

const updateAssessPresets = () => {
  const c = document.getElementById('row-as-presets');
  c.innerHTML = '';
  ASSESS_PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill' + (state.assessPresets.has(p) ? ' sel' : '');
    btn.textContent = p;
    btn.onclick = () => {
      if(state.assessPresets.has(p)) state.assessPresets.delete(p);
      else state.assessPresets.add(p);
      updateAssessPresets();
    };
    c.appendChild(btn);
  });
};

// PMH
const updatePMH = (val) => {
  state.pmh = val;
  document.getElementById('in-pmh').style.display = val === 'known' ? 'block' : 'none';
  renderRadioGroup('row-pmh', [{val:'none', label:'No underlying disease'}, {val:'known', label:'Known cases of...'}], state.pmh, updatePMH);
};

// FH
const updateFH = () => {
  document.getElementById('in-fh-cancer').style.display = state.fh.cancer ? 'block' : 'none';
  document.getElementById('in-fh-other').style.display = state.fh.other ? 'block' : 'none';
  renderCheckboxGroup('row-fh', [
    {val:'dm', label:'DM'}, {val:'htn', label:'HTN'}, {val:'cad', label:'CAD/Stroke'}, 
    {val:'cancer', label:'Cancer'}, {val:'other', label:'Others'}
  ], state.fh, updateFH);
};

// Smoke
const updateSmoke = (val) => {
  state.smoke = val;
  document.getElementById('in-smoke').style.display = (val === 'ex' || val === 'current') ? 'block' : 'none';
  renderRadioGroup('row-smoke', [{val:'never', label:'Never'}, {val:'ex', label:'Ex-smoker'}, {val:'current', label:'Current'}], state.smoke, updateSmoke);
};

// Alcohol
const updateAlc = (val) => {
  state.alc = val;
  document.getElementById('in-alc').style.display = val === 'freq' ? 'block' : 'none';
  renderRadioGroup('row-alc', [{val:'none', label:'None'}, {val:'occ', label:'Occasional'}, {val:'freq', label:'Frequent'}], state.alc, updateAlc);
};

// Exercise
const updateEx = (val) => {
  state.ex = val;
  renderRadioGroup('row-ex', [{val:'none', label:'None'}, {val:'<150', label:'<150 min/wk'}, {val:'>=150', label:'≥150 min/wk (Moderate-Vigorous)'}], state.ex, updateEx);
};

// Allergy
const updateAllergy = (val) => {
  state.allergy = val;
  document.getElementById('in-allergy').style.display = val === 'yes' ? 'block' : 'none';
  renderRadioGroup('row-allergy', [{val:'none', label:'NKDA (No Known Drug Allergies)'}, {val:'yes', label:'Yes...'}], state.allergy, updateAllergy);
};

// Lifestyle
const updateLife = () => {
  renderCheckboxGroup('row-life', [
    {val:'diet', label:'Diet (e.g., Low salt, Low fat, Diabetic diet)'}, 
    {val:'ex', label:'Exercise (Recommend ≥150 min/wk aerobic + resistance)'}, 
    {val:'weight', label:'Weight management / Stop smoking or alcohol'}
  ], state.life, updateLife);
};

// Imaging Setup
const initImaging = () => {
  const cont = document.getElementById('img-inputs-container');
  IMG_LIST.forEach(k => {
    const safeK = k.replace(/\s+/g, '');
    const div = document.createElement('div');
    div.className = 'iw';
    div.id = 'img-div-' + safeK;
    div.style.display = 'none';
    div.style.marginBottom = '6px';
    div.innerHTML = `<label class="lbl">${k}</label><input type="text" id="img-in-${safeK}" placeholder="ผลตรวจ ${k}..."/>`;
    cont.appendChild(div);
  });
};

const updateImgSel = () => {
  const c = document.getElementById('row-img-sel');
  c.innerHTML = '';
  IMG_LIST.forEach(k => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill' + (state.img[k] ? ' sel' : '');
    btn.textContent = k;
    btn.onclick = () => {
      state.img[k] = !state.img[k];
      const safeK = k.replace(/\s+/g, '');
      const div = document.getElementById('img-div-' + safeK);
      if(div) div.style.display = state.img[k] ? 'block' : 'none';
      if(!state.img[k]) document.getElementById('img-in-'+safeK).value = '';
      updateImgSel();
    };
    c.appendChild(btn);
  });
};


function generateOutput() {
  const getVal = (id) => document.getElementById(id).value.trim();
  const getSel = (id) => document.getElementById(id).classList.contains('sel');

  let text = '';

  // 1. CC
  const cc = getVal('in-cc') || 'มาตรวจสุขภาพประจำปี / ไม่มีอาการผิดปกติ (Asymptomatic)';
  text += `Chief Complaint (CC): ${cc}\n`;

  // 2. PMH
  text += `Past Medical History: `;
  if (state.pmh === 'none') {
    text += `No underlying disease\n`;
  } else if (state.pmh === 'known') {
    text += `Known cases of: ${getVal('in-pmh') || '-'}\n`;
  } else {
    text += `\n`;
  }
  
  text += '\n';

  // 3. FH 
  const fhArr = [];
  if (state.fh.dm) fhArr.push('DM');
  if (state.fh.htn) fhArr.push('HTN');
  if (state.fh.cad) fhArr.push('CAD/Stroke');
  if (state.fh.cancer) fhArr.push(`Cancer (${getVal('in-fh-cancer') || '-'})`);
  if (state.fh.other) fhArr.push(`Others: ${getVal('in-fh-other') || '-'}`);
  
  text += `Family History (FH): ${fhArr.length > 0 ? fhArr.join(', ') : 'Denied'}\n\n`;

  // 4. SH
  text += `Social & Lifestyle History (SH):\n`;
  text += `Smoking: `;
  if (state.smoke === 'never') text += 'Never\n';
  else if (state.smoke === 'ex') text += `Ex-smoker (Quit ${getVal('in-smoke') || '___ yrs'})\n`;
  else if (state.smoke === 'current') text += `Current (${getVal('in-smoke') || '___ Cigs/day'})\n`;
  
  text += `Alcohol: `;
  if (state.alc === 'none') text += 'None\n';
  else if (state.alc === 'occ') text += 'Occasional\n';
  else if (state.alc === 'freq') text += `Frequent (${getVal('in-alc') || '___ drinks/week'})\n`;
  
  text += `Exercise: `;
  if (state.ex === 'none') text += 'None\n';
  else if (state.ex === '<150') text += '<150 min/wk\n';
  else if (state.ex === '>=150') text += '≥150 min/wk (Moderate-Vigorous)\n';

  // Hide empty fields
  const diet = getVal('in-diet');
  if (diet) text += `Diet & Sleep: ${diet}\n`;
  
  const meds = getVal('in-meds');
  if (meds) text += `Current Medications / Supplements: ${meds}\n`;

  text += `Allergies: `;
  if (state.allergy === 'none') text += 'NKDA (No Known Drug Allergies)\n';
  else if (state.allergy === 'yes') text += `Yes: ${getVal('in-allergy') || '-'}\n`;
  
  text += '\n';

  // --- Assessment Set Initialization ---
  let asSet = new Set(state.assessPresets);
  let autoPlans = [];

  // Check FBS / HbA1c
  const fbsStr = getVal('lab-fbs');
  if(fbsStr) {
      const nums = fbsStr.match(/\d+(\.\d+)?/g);
      if (nums) {
          let isDM = false, isIFG = false;
          nums.forEach(nStr => {
              const n = parseFloat(nStr);
              if (n >= 126 || n >= 6.5) isDM = true;
              else if ((n >= 100 && n < 126) || (n >= 5.7 && n < 6.5)) isIFG = true;
          });
          if (isDM) asSet.add('DM');
          else if (isIFG) asSet.add('IFG');
      }
  }

  // Check Lipids
  const ldlStr = getVal('lab-ldl');
  const cholStr = getVal('lab-chol');
  const tgStr = getVal('lab-tg');
  if (ldlStr.match(/\d+/) && parseFloat(ldlStr.match(/\d+/)[0]) >= 130) asSet.add('Dyslipidemia (LDL สูง)');
  if (cholStr.match(/\d+/) && parseFloat(cholStr.match(/\d+/)[0]) >= 200) asSet.add('Dyslipidemia (LDL สูง)');
  if (tgStr.match(/\d+/) && parseFloat(tgStr.match(/\d+/)[0]) >= 150) asSet.add('Hypertriglyceridemia');
  
  // 5. Investigations (Show only if filled)
  let invLines = [];
  
  let cbcArr = [];
  if(getVal('lab-hb')) cbcArr.push(`Hb: ${getVal('lab-hb')}`);
  if(getVal('lab-wbc')) cbcArr.push(`WBC: ${getVal('lab-wbc')}`);
  if(getVal('lab-eos')) cbcArr.push(`Eosinophil: ${getVal('lab-eos')}`);
  if(getVal('lab-plt')) cbcArr.push(`Platelet: ${getVal('lab-plt')}`);
  if (cbcArr.length > 0) invLines.push(`CBC: ${cbcArr.join(', ')}`);

  if (fbsStr) invLines.push(`Fasting Blood Sugar / HbA1c: ${fbsStr}`);
  const uricStr = getVal('lab-uric'); if(uricStr) invLines.push(`Uric Acid: ${uricStr}`);
  
  let lipidArr = [];
  if (cholStr) lipidArr.push(`Chol: ${cholStr}`);
  if (tgStr) lipidArr.push(`TG: ${tgStr}`);
  const hdlStr = getVal('lab-hdl'); if (hdlStr) lipidArr.push(`HDL: ${hdlStr}`);
  if (ldlStr) lipidArr.push(`LDL: ${ldlStr}`);
  if (lipidArr.length > 0) invLines.push(`Lipid Profile: ${lipidArr.join(' / ')}`);
  
  let renalArr = [];
  if(getVal('lab-bun')) renalArr.push(`BUN: ${getVal('lab-bun')}`);
  if(getVal('lab-cr')) renalArr.push(`Cr: ${getVal('lab-cr')}`);
  if(getVal('lab-egfr')) renalArr.push(`eGFR: ${getVal('lab-egfr')}`);
  if (renalArr.length > 0) invLines.push(`Renal Function: ${renalArr.join(', ')}`);

  let liverArr = [];
  if(getVal('lab-ast')) liverArr.push(`AST: ${getVal('lab-ast')}`);
  if(getVal('lab-alt')) liverArr.push(`ALT: ${getVal('lab-alt')}`);
  if(getVal('lab-alp')) liverArr.push(`ALP: ${getVal('lab-alp')}`);
  if (liverArr.length > 0) invLines.push(`Liver Function: ${liverArr.join(', ')}`);

  let uaArr = [];
  if(getVal('lab-upro')) uaArr.push(`Protein: ${getVal('lab-upro')}`);
  if(getVal('lab-uglu')) uaArr.push(`Glucose: ${getVal('lab-uglu')}`);
  if(getVal('lab-uwbc')) uaArr.push(`WBC: ${getVal('lab-uwbc')}`);
  if(getVal('lab-urbc')) uaArr.push(`RBC: ${getVal('lab-urbc')}`);
  if (uaArr.length > 0) invLines.push(`Urine Examination: ${uaArr.join(', ')}`);

  // Imaging processing
  IMG_LIST.forEach(k => {
      if(state.img[k]) {
          const val = getVal('img-in-' + k.replace(/\s+/g, ''));
          if (val) invLines.push(`${k}: ${val}`);
      }
  });

  if (invLines.length > 0) {
    text += `Investigation Results\n`;
    text += invLines.join('\n') + '\n\n';
  }

  // 6. Assessment
  let asLines = [];
  const overall = getVal('as-overall'); 
  if (overall) asLines.push(`Overall Status: ${overall}`);
  
  const nf = getVal('as-nf'); 
  if (getSel('btn-nf') && nf) asLines.push(`New Findings: ${nf}`);
  
  const spmh = getVal('as-spmh'); 
  if (getSel('btn-spmh') && spmh) asLines.push(`Status of Existing PMH: ${spmh}`);
  
  const risk = getVal('as-risk'); 
  if (risk) asLines.push(`Risk Stratification: ${risk}`);
  
  // Merge Auto Assessment & Presets
  asSet.forEach(a => {
      asLines.push(a);
  });

  if (asLines.length > 0) {
    text += `Assessment\n`;
    asLines.forEach((l, i) => {
      text += `${i + 1}. ${l}\n`;
    });
    text += '\n';
  }

  // Auto Plans based on Assessment Set
  if (asSet.has('DM')) {
      autoPlans.push('- DM: แนะนำควบคุมอาหารประเภทแป้ง ของหวาน และผลไม้รสหวาน ทานยาตามแพทย์สั่งอย่างเคร่งครัดและติดตามอาการอย่างสม่ำเสมอ');
  } else if (asSet.has('IFG')) {
      autoPlans.push('- IFG: แนะนำลดการบริโภคอาหารหวาน น้ำหวาน แป้งขัดขาว และออกกำลังกายสม่ำเสมอเพื่อควบคุมน้ำหนัก ลดความเสี่ยงเบาหวาน');
  }

  if (asSet.has('Dyslipidemia (LDL สูง)') || asSet.has('Hypertriglyceridemia')) {
      autoPlans.push('- DLP/Hypertriglyceridemia: แนะนำหลีกเลี่ยงอาหารที่มีไขมันสูง ของทอด ของมัน กะทิ เนื้อสัตว์ติดมัน และออกกำลังกายแบบแอโรบิกสม่ำเสมอเพื่อลดระดับไขมัน');
  }

  if (asSet.has('Hyperuricemia / Gout')) {
      autoPlans.push('- Uric/Gout: แนะนำงดเครื่องดื่มแอลกอฮอล์ หลีกเลี่ยงการรับประทานสัตว์ปีก เครื่องในสัตว์ และยอดผัก ดื่มน้ำให้เพียงพอ');
  }

  if (asSet.has('Obesity / Overweight / Metabolic Syndrome') || asSet.has('Fatty Liver (NAFLD / MASLD)')) {
      autoPlans.push('- Weight/Fatty Liver: แนะนำควบคุมปริมาณแคลอรี่ ลดอาหารจำพวกแป้งและน้ำตาล ออกกำลังกายสม่ำเสมอเพื่อลดน้ำหนัก และหลีกเลี่ยงแอลกอฮอล์');
  }

  // 7. Plan (Show only checked items + Auto Plans)
  let planText = '';
  let lifeArr = [];
  if (state.life.diet) lifeArr.push('- Diet (e.g., Low salt, Low fat, Diabetic diet)');
  if (state.life.ex) lifeArr.push('- Exercise (Recommend ≥150 min/wk aerobic + resistance)');
  if (state.life.weight) lifeArr.push('- Weight management / Stop smoking or alcohol');
  
  if (lifeArr.length > 0) {
    planText += `Lifestyle Modification (คำแนะนำ):\n${lifeArr.join('\n')}\n\n`;
  }

  if (autoPlans.length > 0) {
    planText += `Disease-Specific Recommendations:\n${autoPlans.join('\n')}\n\n`;
  }
  
  const invPlan = getVal('pl-inv');
  if (invPlan) planText += `Further Investigations: ${invPlan}\n\n`;

  let fuArr = [];
  if (getSel('btn-fu1')) fuArr.push('Routine Annual Check-up next year');
  
  const fu2 = getVal('pl-fu');
  if (getSel('btn-fu2')) fuArr.push(`F/U for abnormal results in: ${fu2 || '___'}`);
  
  if (fuArr.length > 0) {
    planText += `Follow-up (F/U):\n${fuArr.map(x => '- ' + x).join('\n')}\n`;
  }

  if (planText) {
    text += `Plan\n${planText}`;
  }

  document.getElementById('out-text').textContent = text.trim();
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-output').style.display = 'block';
  window.scrollTo(0,0);
}

function showForm() {
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('view-output').style.display = 'none';
}

function copyOutput(btn) {
  const text = document.getElementById('out-text').textContent;
  navigator.clipboard.writeText(text);
  btn.textContent = 'COPIED ✓';
  btn.classList.add('ok');
  setTimeout(() => {
    btn.textContent = 'COPY TEXT';
    btn.classList.remove('ok');
  }, 1500);
}

// Init
updatePMH('none');
updateFH();
updateSmoke('never');
updateAlc('none');
updateEx('none');
updateAllergy('none');
updateLife();
initImaging();
updateImgSel();
updateAssessPresets();
</script>
</body>
</html>
