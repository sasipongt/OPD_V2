<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Health Check-up Medical Record</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* CSS หลัก */
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --accent:#00d4aa;--accent2:#00a882;--accent-bg:rgba(0,212,170,.12);
  --red:#ff4757;--red-bg:rgba(255,71,87,.12);
  --yellow:#ffd700;--yellow-bg:rgba(255,215,0,.1);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,.12);
  --mono:'JetBrains Mono',monospace;
  --sans:'IBM Plex Sans Thai',sans-serif;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;line-height:1.6}
.shell{max-width:720px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0}
.hdr-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.14em;text-transform:uppercase}
.hdr-date{font-size:11px;color:var(--text3);margin-left:auto;font-family:var(--mono)}
#view-form,#view-output{display:block}
.sec{margin-bottom:1.75rem}
.sec-lbl{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:.875rem;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.lbl{font-size:10px;color:var(--text3);display:block;margin-bottom:4px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.iw{margin-bottom:.75rem}
input[type=text],textarea{
  width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:8px 12px;font-size:13px;font-family:var(--sans);color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input[type=text]:focus,textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.pill{
  border:0.5px solid var(--border2);border-radius:999px;padding:5px 14px;font-size:12px;
  cursor:pointer;font-family:var(--mono);background:var(--bg3);color:var(--text2);
  transition:all .15s;user-select:none;
}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.sel{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(0,212,170,.15)}
.pill.sub-sel{background:rgba(255,215,0,.12);border-color:var(--yellow);color:var(--yellow);box-shadow:0 0 8px rgba(255,215,0,.15)}
.subtype-container{
  background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);
  padding:0.75rem;margin-top:0.5rem;display:none;
}
.subtype-container .lbl{color:var(--yellow);margin-bottom:8px}
.gen-btn{
  width:100%;background:var(--accent);border:none;border-radius:var(--r);
  padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;color:#000;
  font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;
  transition:all .15s;margin-top:.5rem;
}
.gen-btn:hover{background:var(--accent2);box-shadow:0 0 20px rgba(0,212,170,.25)}
.out-panel{display:none;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem}
.out-panel.active{display:block}
.out-pre{font-family:var(--sans);font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.out-actions{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.copy-btn,.back-btn,.new-btn{
  background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:7px 16px;font-size:10px;cursor:pointer;color:var(--text2);font-family:var(--mono);
  transition:all .15s;letter-spacing:.08em;text-transform:uppercase;
}
.copy-btn:hover,.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.ok{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.new-btn:hover{border-color:var(--red);color:var(--red)}

/* ========== TAB STYLES ========== */
.tab-nav{
  display:flex;gap:4px;margin-bottom:0;border-bottom:0.5px solid var(--border);
}
.tab-btn{
  background:transparent;border:none;border-bottom:2px solid transparent;
  padding:8px 16px;font-size:11px;cursor:pointer;color:var(--text3);
  font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;
  transition:all .15s;margin-bottom:-0.5px;
}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{
  color:var(--accent);border-bottom-color:var(--accent);
}
.tab-btn.patient-tab.active{
  color:var(--blue);border-bottom-color:var(--blue);
}
.tab-content{display:none}
.tab-content.active{display:block}

/* Patient Advice Styles */
.advice-section{margin-bottom:1.5rem}
.advice-section-title{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;
  padding-bottom:6px;border-bottom:0.5px solid var(--border);
}
.advice-block{
  background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);
  padding:1rem;margin-bottom:0.75rem;
}
.advice-title{
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;
}
.advice-text{
  font-family:var(--sans);font-size:13px;line-height:1.8;color:var(--text);
}
.advice-sub{
  font-family:var(--sans);font-size:13px;line-height:1.8;color:var(--text2);
  margin-top:6px;padding-left:12px;border-left:2px solid var(--border2);
}
.advice-warn{
  background:var(--red-bg);border:0.5px solid rgba(255,71,87,.25);border-radius:var(--r);
  padding:0.75rem 1rem;margin-top:0.75rem;
}
.advice-warn .advice-title{color:var(--red)}
.no-advice{
  text-align:center;padding:2rem 1rem;color:var(--text3);
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-dot"></div>
    <div class="hdr-title">Check-up Note Template</div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="view-form">
    
    <div class="sec">
      <div class="sec-lbl">Chief Complaint & History</div>
      <div class="iw">
        <label class="lbl">Chief Complaint (CC)</label>
        <input type="text" id="in-cc" placeholder="มาตรวจสุขภาพประจำปี / ไม่มีอาการผิดปกติ" value="มาตรวจสุขภาพประจำปี / ไม่มีอาการผิดปกติ (Asymptomatic)"/>
      </div>
      <div class="iw">
        <label class="lbl">Past Medical History (PMH)</label>
        <div class="pill-row" id="row-pmh"></div>
        <input type="text" id="in-pmh" placeholder="ระบุโรคประจำตัวและระยะเวลา" style="display:none;margin-top:4px"/>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Family History (FH)</div>
      <div class="pill-row" id="row-fh"></div>
      <div class="g2">
        <input type="text" id="in-fh-cancer" placeholder="ระบุชนิดมะเร็ง..." style="display:none"/>
        <input type="text" id="in-fh-other" placeholder="ระบุโรคอื่นๆ..." style="display:none"/>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Social & Lifestyle History (SH)</div>
      <div class="iw"><label class="lbl">Smoking</label><div class="pill-row" id="row-smoke"></div><input type="text" id="in-smoke" placeholder="รายละเอียด" style="display:none;margin-top:4px"/></div>
      <div class="iw"><label class="lbl">Alcohol</label><div class="pill-row" id="row-alc"></div><input type="text" id="in-alc" placeholder="รายละเอียด" style="display:none;margin-top:4px"/></div>
      <div class="iw"><label class="lbl">Exercise</label><div class="pill-row" id="row-ex"></div></div>
      <div class="iw"><label class="lbl">Diet & Sleep</label><input type="text" id="in-diet" placeholder="ระบุการรับประทานอาหารและการนอนหลับ"/></div>
      <div class="iw"><label class="lbl">Current Medications / Supplements</label><input type="text" id="in-meds" placeholder="ยาและอาหารเสริมที่ทานประจำ"/></div>
      <div class="iw"><label class="lbl">Allergies</label><div class="pill-row" id="row-allergy"></div><input type="text" id="in-allergy" placeholder="ระบุชื่อยาที่แพ้" style="display:none;margin-top:4px"/></div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Investigation Results</div>
      <div class="iw"><label class="lbl">CBC</label><div class="g4"><input type="text" id="lab-hb" placeholder="Hb"/><input type="text" id="lab-wbc" placeholder="WBC"/><input type="text" id="lab-eos" placeholder="Eosinophil"/><input type="text" id="lab-plt" placeholder="Platelet"/></div></div>
      <div class="g2"><div class="iw"><label class="lbl">Fasting Blood Sugar / HbA1c</label><input type="text" id="lab-fbs"/></div><div class="iw"><label class="lbl">Uric Acid</label><input type="text" id="lab-uric"/></div></div>
      <div class="iw"><label class="lbl">Lipid Profile</label><div class="g4"><input type="text" id="lab-chol" placeholder="Chol"/><input type="text" id="lab-tg" placeholder="TG"/><input type="text" id="lab-hdl" placeholder="HDL"/><input type="text" id="lab-ldl" placeholder="LDL"/></div></div>
      <div class="iw"><label class="lbl">Renal Function (Kidney)</label><div class="g3"><input type="text" id="lab-bun" placeholder="BUN"/><input type="text" id="lab-cr" placeholder="Cr"/><input type="text" id="lab-egfr" placeholder="eGFR"/></div></div>
      <div class="iw"><label class="lbl">Liver Function</label><div class="g3"><input type="text" id="lab-ast" placeholder="AST"/><input type="text" id="lab-alt" placeholder="ALT"/><input type="text" id="lab-alp" placeholder="ALP"/></div></div>
      <div class="iw"><label class="lbl">Urine Examination</label><div class="g4"><input type="text" id="lab-upro" placeholder="Protein"/><input type="text" id="lab-uglu" placeholder="Glucose"/><input type="text" id="lab-uwbc" placeholder="WBC"/><input type="text" id="lab-urbc" placeholder="RBC"/></div></div>
      <div class="iw"><label class="lbl">Imaging & Special Tests</label><div class="pill-row" id="row-img-sel"></div><div id="img-inputs-container"></div></div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Assessment & Plan</div>
      <div class="iw"><label class="lbl">Common Problems Presets</label><div class="pill-row" id="row-as-presets"></div></div>
      <div class="subtype-container" id="subtype-container"><label class="lbl" id="subtype-lbl">Sub-classification:</label><div class="pill-row" id="row-subtypes"></div></div>
      <div class="iw"><label class="lbl">1. Overall Status</label><input type="text" id="as-overall" placeholder="e.g., Healthy adult"/></div>
      <div class="iw"><label class="lbl">2. New Findings</label><div style="display:flex;gap:10px"><button class="pill" id="btn-nf" onclick="toggleActive(this)">Select</button><input type="text" id="as-nf" placeholder="ระบุการค้นพบใหม่..." style="flex:1"/></div></div>
      <div class="iw"><label class="lbl">3. Status of Existing PMH</label><div style="display:flex;gap:10px"><button class="pill" id="btn-spmh" onclick="toggleActive(this)">Select</button><input type="text" id="as-spmh" placeholder="e.g., Well-controlled HTN" style="flex:1"/></div></div>
      <div class="iw"><label class="lbl">4. Risk Stratification</label><input type="text" id="as-risk" placeholder="e.g., High cardiovascular risk..."/></div>
    </div>

    <div class="sec">
      <div class="sec-lbl">General Plan & Follow-up</div>
      <div class="iw"><label class="lbl">General Lifestyle Modification</label><div class="pill-row" id="row-life"></div></div>
      <div class="iw"><label class="lbl">Further Investigations</label><input type="text" id="pl-inv" placeholder="การตรวจเพิ่มเติม..."/></div>
      <div class="iw"><label class="lbl">Follow-up (F/U)</label><div style="margin-bottom:6px"><button class="pill" id="btn-fu1" onclick="toggleActive(this)">Routine Annual Check-up next year</button></div><div style="display:flex;gap:10px"><button class="pill" id="btn-fu2" onclick="toggleActive(this)">F/U for abnormal results in:</button><input type="text" id="pl-fu" placeholder="___ Weeks/Months" style="flex:1"/></div></div>
    </div>

    <button class="gen-btn" type="button" onclick="generateOutput()">Generate Record</button>
  </div>

  <!-- OUTPUT VIEW -->
  <div id="view-output" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.12em;text-transform:uppercase">Output</span>
    </div>
    
    <div class="tab-nav">
      <button class="tab-btn active" id="tab-medical" onclick="switchTab('medical')">Medical Record</button>
      <button class="tab-btn patient-tab" id="tab-patient" onclick="switchTab('patient')">คำแนะนำผู้ป่วย</button>
    </div>

    <div class="tab-content active" id="content-medical">
      <div class="out-panel active">
        <pre class="out-pre" id="out-text"></pre>
        <div class="out-actions">
          <button class="copy-btn" onclick="copyOutput(this, 'out-text')">COPY TEXT</button>
          <button class="back-btn" onclick="showForm()">← แก้ไขข้อมูล</button>
          <button class="new-btn" style="margin-left:auto" onclick="location.reload()">+ CLEAR FORM</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="content-patient">
      <div class="out-panel active">
        <div id="patient-advice-content"></div>
        <div class="out-actions">
          <button class="copy-btn" onclick="copyPatientAdvice()">COPY ADVICE</button>
          <button class="back-btn" onclick="showForm()">← แก้ไขข้อมูล</button>
          <button class="new-btn" style="margin-left:auto" onclick="location.reload()">+ CLEAR FORM</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('th-TH', {year:'numeric',month:'short',day:'numeric'});

const SUBTYPE_OPTIONS = {
  'Fatty Liver (NAFLD / MASLD)': [
    {val:'mild', label:'Mild'},{val:'moderate', label:'Moderate'},{val:'severe', label:'Severe'}
  ],
  'Anemia': [
    {val:'normocytic', label:'Normochromic Normocytic'},{val:'microcytic', label:'Hypochromic Microcytic'},{val:'macrocytic', label:'Macrocytic'}
  ]
};

let state = {
  pmh: 'none', fh: { dm: false, htn: false, cad: false, cancer: false, other: false },
  smoke: 'never', alc: 'none', ex: 'none', allergy: 'none',
  life: { diet: false, ex: false, weight: false }, img: {},
  assessPresets: new Set(), assessSubtypes: {}
};

const IMG_LIST = ['CXR', 'US abdomen', 'MMG', 'CT Calcium score', 'BMD', 'ABI', 'EKG', 'EST', 'Fibroscan'];
IMG_LIST.forEach(k => state.img[k] = false);
Object.keys(SUBTYPE_OPTIONS).forEach(key => { state.assessSubtypes[key] = 'none'; });

const ASSESS_PRESETS = [
  'Dyslipidemia (LDL สูง)', 'Hypertriglyceridemia', 'IFG', 'DM', 
  'Hyperuricemia / Gout', 'Obesity', 'Overweight', 'Metabolic Syndrome', 
  'Fatty Liver (NAFLD / MASLD)', 'Elevated Liver Enzymes', 'Microscopic Hematuria', 
  'Proteinuria', 'Asymptomatic Bacteriuria', 'Anemia', 'Eosinophilia', 'Leukopenia', 'Abnormal ECG'
];

// เก็บ patientAdviceItems ไว้ใน scope นอกเพื่อให้ copy ได้
let currentPatientAdviceItems = [];

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tabName).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('content-' + tabName).classList.add('active');
}

function toggleActive(btn) { btn.classList.toggle('sel'); }

function getActiveSubtypeProblems() {
  const active = [];
  state.assessPresets.forEach(p => { if (SUBTYPE_OPTIONS[p]) active.push(p); });
  return active;
}

function renderSubtypes() {
  const container = document.getElementById('subtype-container');
  const lbl = document.getElementById('subtype-lbl');
  const row = document.getElementById('row-subtypes');
  const activeProblems = getActiveSubtypeProblems();
  if (activeProblems.length === 0) { container.style.display = 'none'; return; }
  row.innerHTML = '';
  if (activeProblems.length === 1) {
    const problemKey = activeProblems[0];
    const options = SUBTYPE_OPTIONS[problemKey];
    container.style.display = 'block';
    lbl.textContent = `Sub-classification for ${problemKey}:`;
    const noneBtn = document.createElement('button'); noneBtn.type = 'button'; noneBtn.className = 'pill' + (state.assessSubtypes[problemKey] === 'none' ? ' sub-sel' : ''); noneBtn.textContent = 'Not specified'; noneBtn.onclick = () => { state.assessSubtypes[problemKey] = 'none'; renderSubtypes(); }; row.appendChild(noneBtn);
    options.forEach(opt => {
      const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (state.assessSubtypes[problemKey] === opt.val ? ' sub-sel' : ''); btn.textContent = opt.label; btn.onclick = () => { state.assessSubtypes[problemKey] = opt.val; renderSubtypes(); }; row.appendChild(btn);
    });
  } else {
    container.style.display = 'block'; lbl.textContent = 'Sub-classification:';
    activeProblems.forEach(problemKey => {
      const options = SUBTYPE_OPTIONS[problemKey];
      const problemLabel = document.createElement('div'); problemLabel.style.cssText = 'font-size:10px;color:var(--text2);margin:8px 0 4px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;width:100%'; problemLabel.textContent = problemKey + ':'; row.appendChild(problemLabel);
      const btnGroup = document.createElement('div'); btnGroup.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;width:100%;margin-bottom:4px';
      const noneBtn = document.createElement('button'); noneBtn.type = 'button'; noneBtn.className = 'pill' + (state.assessSubtypes[problemKey] === 'none' ? ' sub-sel' : ''); noneBtn.textContent = 'Not specified'; noneBtn.onclick = () => { state.assessSubtypes[problemKey] = 'none'; renderSubtypes(); }; btnGroup.appendChild(noneBtn);
      options.forEach(opt => {
        const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (state.assessSubtypes[problemKey] === opt.val ? ' sub-sel' : ''); btn.textContent = opt.label; btn.onclick = () => { state.assessSubtypes[problemKey] = opt.val; renderSubtypes(); }; btnGroup.appendChild(btn);
      });
      row.appendChild(btnGroup);
    });
  }
}

function renderRadioGroup(containerId, options, activeVal, callback) {
  const c = document.getElementById(containerId); c.innerHTML = '';
  options.forEach(opt => { const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (activeVal === opt.val ? ' sel' : ''); btn.textContent = opt.label; btn.onclick = () => callback(opt.val); c.appendChild(btn); });
}
function renderCheckboxGroup(containerId, options, stateObj, callback) {
  const c = document.getElementById(containerId); c.innerHTML = '';
  options.forEach(opt => { const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (stateObj[opt.val] ? ' sel' : ''); btn.textContent = opt.label; btn.onclick = () => { stateObj[opt.val] = !stateObj[opt.val]; callback(); }; c.appendChild(btn); });
}

const updateAssessPresets = () => {
  const c = document.getElementById('row-as-presets'); c.innerHTML = '';
  ASSESS_PRESETS.forEach(p => {
    const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (state.assessPresets.has(p) ? ' sel' : ''); btn.textContent = p;
    btn.onclick = () => {
      if(state.assessPresets.has(p)) { state.assessPresets.delete(p); if (SUBTYPE_OPTIONS[p]) state.assessSubtypes[p] = 'none'; }
      else state.assessPresets.add(p);
      updateAssessPresets(); renderSubtypes();
    }; c.appendChild(btn);
  });
};

const updatePMH = (val) => { state.pmh = val; document.getElementById('in-pmh').style.display = val === 'known' ? 'block' : 'none'; renderRadioGroup('row-pmh', [{val:'none', label:'No underlying disease'}, {val:'known', label:'Known cases of...'}], state.pmh, updatePMH); };
const updateFH = () => { document.getElementById('in-fh-cancer').style.display = state.fh.cancer ? 'block' : 'none'; document.getElementById('in-fh-other').style.display = state.fh.other ? 'block' : 'none'; renderCheckboxGroup('row-fh', [{val:'dm', label:'DM'}, {val:'htn', label:'HTN'}, {val:'cad', label:'CAD/Stroke'}, {val:'cancer', label:'Cancer'}, {val:'other', label:'Others'}], state.fh, updateFH); };
const updateSmoke = (val) => { state.smoke = val; document.getElementById('in-smoke').style.display = (val === 'ex' || val === 'current') ? 'block' : 'none'; renderRadioGroup('row-smoke', [{val:'never', label:'Never'}, {val:'ex', label:'Ex-smoker'}, {val:'current', label:'Current'}], state.smoke, updateSmoke); };
const updateAlc = (val) => { state.alc = val; document.getElementById('in-alc').style.display = val === 'freq' ? 'block' : 'none'; renderRadioGroup('row-alc', [{val:'none', label:'None'}, {val:'occ', label:'Occasional'}, {val:'freq', label:'Frequent'}], state.alc, updateAlc); };
const updateEx = (val) => { state.ex = val; renderRadioGroup('row-ex', [{val:'none', label:'None'}, {val:'<150', label:'<150 min/wk'}, {val:'>=150', label:'≥150 min/wk (Moderate-Vigorous)'}], state.ex, updateEx); };
const updateAllergy = (val) => { state.allergy = val; document.getElementById('in-allergy').style.display = val === 'yes' ? 'block' : 'none'; renderRadioGroup('row-allergy', [{val:'none', label:'NKDA (No Known Drug Allergies)'}, {val:'yes', label:'Yes...'}], state.allergy, updateAllergy); };
const updateLife = () => { renderCheckboxGroup('row-life', [{val:'diet', label:'Diet (e.g., Low salt, Low fat, Diabetic diet)'}, {val:'ex', label:'Exercise (Recommend ≥150 min/wk aerobic + resistance)'}, {val:'weight', label:'Weight management / Stop smoking or alcohol'}], state.life, updateLife); };

const initImaging = () => {
  const cont = document.getElementById('img-inputs-container');
  IMG_LIST.forEach(k => { const safeK = k.replace(/\s+/g, ''); const div = document.createElement('div'); div.className = 'iw'; div.id = 'img-div-' + safeK; div.style.display = 'none'; div.style.marginBottom = '6px'; div.innerHTML = `<label class="lbl">${k}</label><input type="text" id="img-in-${safeK}" placeholder="ผลตรวจ ${k}..."/>`; cont.appendChild(div); });
};
const updateImgSel = () => {
  const c = document.getElementById('row-img-sel'); c.innerHTML = '';
  IMG_LIST.forEach(k => {
    const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'pill' + (state.img[k] ? ' sel' : ''); btn.textContent = k;
    btn.onclick = () => { state.img[k] = !state.img[k]; const safeK = k.replace(/\s+/g, ''); const div = document.getElementById('img-div-' + safeK); if(div) div.style.display = state.img[k] ? 'block' : 'none'; if(!state.img[k]) document.getElementById('img-in-'+safeK).value = ''; updateImgSel(); }; c.appendChild(btn);
  });
};

function getSubtypeLabel(problemKey, subtypeVal) {
  if (!SUBTYPE_OPTIONS[problemKey] || subtypeVal === 'none') return '';
  const opt = SUBTYPE_OPTIONS[problemKey].find(o => o.val === subtypeVal);
  return opt ? ` (${opt.label})` : '';
}

      adviceObj = { title: 'ตรวจพบเชื้อแบคทีเรียในปัสสาวะ (ไม่มีอาการ)', text: 'ตรวจพบเชื้อแบคทีเรียในปัสสาวะโดยที่คุณไม่มีอาการผิดปกติใดๆ เช่น ปัสสาวะแสบขัด ปวดท้องน้อย หรือมีไข้', sub: '- ในผู้หญิงสุขภาพดีที่ไม่มีอาการ ไม่จำเป็นต้องรักษาด้วยยาปฏิชีวนะ\n- หากมีอาการผิดปกติเกิดขึ้นภายหลัง เช่น แสบขัดเวลาปัสสาวะ ปัสสาวะบ่อย มีไข้ ให้กลับมาพบแพทย์' };
    } else if (a === 'Proteinuria') {
      assessTitle = 'ตรวจพบโปรตีนในปัสสาวะ';
      adviceObj = { title: 'ตรวจพบโปรตีนในปัสสาวะ', text: 'ตรวจพบโปรตีนรั่วในปัสสาวะ ซึ่งอาจเป็นสัญญาณของความผิดปกติของไต หรืออาจเกิดจากปัจจัยชั่วคราว เช่น การออกกำลังกายหนัก มีไข้ หรือการยืนนาน', sub: '- ตรวจปัสสาวะซ้ำใน 1-2 สัปดาห์\n- หากยังตรวจพบโปรตีน แพทย์จะพิจารณาตรวจเพิ่มเติมเพื่อประเมินการทำงานของไต' };
    } else if (a === 'Eosinophilia') {
      assessTitle = 'ตรวจพบเม็ดเลือดขาวชนิด Eosinophil สูง';
      adviceObj = { title: 'ตรวจพบเม็ดเลือดขาวชนิด Eosinophil สูง', text: 'ตรวจพบระดับ Eosinophil ในเลือดสูงกว่าปกติ ซึ่งมักเกี่ยวข้องกับภาวะภูมิแพ้ การติดเชื้อปรสิต หรือปฏิกิริยาจากยา', sub: '- สังเกตอาการภูมิแพ้ เช่น ผื่นคัน จาม น้ำมูกไหล\n- หากมีประวัติรับประทานยาหรือสมุนไพร ควรแจ้งแพทย์\n- แพทย์อาจนัดตรวจเพิ่มเติมตามความเหมาะสม' };
    } else if (a === 'Leukopenia') {
      assessTitle = 'ตรวจพบเม็ดเลือดขาวต่ำ';
      adviceObj = { title: 'ตรวจพบเม็ดเลือดขาวต่ำ', text: 'ตรวจพบระดับเม็ดเลือดขาวในเลือดต่ำกว่าปกติ ซึ่งอาจเกิดจากการติดเชื้อไวรัส ยาบางชนิด หรือภาวะทางภูมิคุ้มกัน', sub: '- หลีกเลี่ยงการสัมผัสผู้ป่วยติดเชื้อ ล้างมือบ่อยๆ\n- หากมีไข้หรืออาการติดเชื้อ ให้รีบพบแพทย์\n- แพทย์อาจนัดตรวจเลือดซ้ำเพื่อติดตาม' };
    } else if (a === 'Abnormal ECG') {
      assessTitle = 'ตรวจพบคลื่นไฟฟ้าหัวใจผิดปกติ';
      adviceObj = { title: 'ตรวจพบคลื่นไฟฟ้าหัวใจผิดปกติ', text: 'ผลตรวจคลื่นไฟฟ้าหัวใจ (EKG) พบความผิดปกติ ซึ่งอาจต้องได้รับการตรวจเพิ่มเติมเพื่อประเมินการทำงานของหัวใจ', sub: '- แพทย์จะพิจารณาส่งตรวจเพิ่มเติม เช่น การตรวจหัวใจด้วยคลื่นเสียงสะท้อน (Echocardiogram) หรือการเดินสายพาน (EST)\n- หากมีอาการเจ็บหน้าอก ใจสั่น หรือเหนื่อยง่าย ควรรีบพบแพทย์', warn: 'ควรพบแพทย์เพื่อประเมินผลตรวจและวางแผนการตรวจรักษาต่อไป' };
    }

    if (assessTitle) assessmentItems.push(assessTitle);
    if (adviceObj && !addedAdviceTitles.has(adviceObj.title)) {
      addedAdviceTitles.add(adviceObj.title);
      adviceItems.push(adviceObj);
    }
  });

  // Lifestyle advice (แยก)
  if (state.life.diet || state.life.ex || state.life.weight) {
    let lifestyleText = '';
    if (state.life.diet) lifestyleText += '- ปรับเปลี่ยนอาหารตามคำแนะนำ (ลดเค็ม ลดไขมัน ควบคุมอาหารเฉพาะโรค)\n';
    if (state.life.ex) lifestyleText += '- ออกกำลังกายอย่างน้อย 150 นาทีต่อสัปดาห์ ทั้งแบบแอโรบิกและแรงต้าน\n';

      addedAdviceTitles.add('การปรับเปลี่ยนพฤติกรรมทั่วไป');
      adviceItems.push({ title: 'การปรับเปลี่ยนพฤติกรรมทั่วไป', text: 'การปรับเปลี่ยนพฤติกรรมเป็นพื้นฐานสำคัญในการป้องกันและรักษาโรคเรื้อรัง', sub: lifestyleText.trim() });
    }
  }

  if (state.smoke === 'current' && !addedAdviceTitles.has('การเลิกบุหรี่')) {
    addedAdviceTitles.add('การเลิกบุหรี่');
    adviceItems.push({ title: 'การเลิกบุหรี่', text: 'การสูบบุหรี่เพิ่มความเสี่ยงต่อโรคหัวใจ มะเร็งปอด และโรคเรื้อรังอื่นๆ อย่างมีนัยสำคัญ', sub: '- ปรึกษาแพทย์เพื่อขอคำแนะนำในการเลิกบุหรี่\n- มีบริการให้คำปรึกษาและยาช่วยเลิกบุหรี่', warn: 'การเลิกบุหรี่เป็นการเปลี่ยนแปลงที่ส่งผลดีต่อสุขภาพมากที่สุดอย่างหนึ่ง' });
  }

  currentPatientAdviceItems = { assessmentItems, adviceItems };
  return currentPatientAdviceItems;
}

function renderPatientAdvice(data) {
  const container = document.getElementById('patient-advice-content');
  if (!data || (data.assessmentItems.length === 0 && data.adviceItems.length === 0)) {
    container.innerHTML = '<div class="no-advice">ผลตรวจสุขภาพโดยรวมอยู่ในเกณฑ์ปกติ ยังไม่มีคำแนะนำเพิ่มเติมในขณะนี้</div>';
    return;
  }

  let html = '';
  
  // Section 1: Assessment
  if (data.assessmentItems.length > 0) {
    html += '<div class="advice-section"><div class="advice-section-title"># สิ่งที่ตรวจพบ (Assessment)</div>';
    data.assessmentItems.forEach((item, i) => {
      html += `<div class="advice-block"><div class="advice-title">#${i + 1}. ${item}</div></div>`;
    });
    html += '</div>';
  }

  // Section 2: คำแนะนำ
  if (data.adviceItems.length > 0) {
    html += '<div class="advice-section"><div class="advice-section-title">- คำแนะนำ (Advice)</div>';
    data.adviceItems.forEach((item, i) => {
      html += `<div class="advice-block">
        <div class="advice-title">- ${item.title}</div>
        <div class="advice-text">${item.text}</div>`;
      if (item.sub) {
        html += `<div class="advice-sub">${item.sub.replace(/\n/g, '<br>')}</div>`;
      }
      if (item.warn) {
        html += `<div class="advice-warn"><div class="advice-title">คำแนะนำเพิ่มเติม</div><div class="advice-text">${item.warn}</div></div>`;
      }
      html += `</div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

function copyPatientAdvice() {
  if (!currentPatientAdviceItems || (currentPatientAdviceItems.assessmentItems.length === 0 && currentPatientAdviceItems.adviceItems.length === 0)) {
    alert('ไม่มีข้อมูลให้คัดลอก');
    return;
  }
  
  let text = '';
  
  if (currentPatientAdviceItems.assessmentItems.length > 0) {
    text += '# สิ่งที่ตรวจพบ (Assessment)\n';
    currentPatientAdviceItems.assessmentItems.forEach((item, i) => {
      text += `#${i + 1}. ${item}\n`;
    });
    text += '\n';
  }
  
  if (currentPatientAdviceItems.adviceItems.length > 0) {
    text += '- คำแนะนำ (Advice)\n';
    currentPatientAdviceItems.adviceItems.forEach(item => {
      text += `- ${item.title}\n`;
      text += `  ${item.text}\n`;
      if (item.sub) {
        item.sub.split('\n').forEach(line => {
          text += `  ${line}\n`;
        });
      }
      if (item.warn) {
        text += `  [คำแนะนำเพิ่มเติม] ${item.warn}\n`;
      }
      text += '\n';
    });
  }

  navigator.clipboard.writeText(text.trim());
  const btn = document.querySelector('#content-patient .copy-btn');
  btn.textContent = 'COPIED ✓';
  btn.classList.add('ok');
  setTimeout(() => {
    btn.textContent = 'COPY ADVICE';
    btn.classList.remove('ok');
  }, 1500);
}

    else if (a === 'Elevated Liver Enzymes') { pLines.push(`- Investigate etiology: ${drinksAlc ? 'alcohol use, ' : ''}viral hepatitis, medications, fatty liver.`); pLines.push(`- Avoid hepatotoxic medications${drinksAlc ? ' and alcohol' : ''}.`); pLines.push('- Repeat LFT in 4-8 weeks.'); pLines.push('- Refer if persistently elevated or >3x ULN.'); }
    else if (a === 'Fatty Liver (NAFLD / MASLD)') { const subtype = state.assessSubtypes['Fatty Liver (NAFLD / MASLD)'] || 'none'; displayTitle = 'Fatty Liver (NAFLD / MASLD)' + getSubtypeLabel('Fatty Liver (NAFLD / MASLD)', subtype); pLines.push('- Diet: Recommend hypocaloric diet (500–1000 kcal deficit/day) / Mediterranean diet (high in mono- and polyunsaturated fats, vegetables, legumes, fish; low in refined carbohydrates, fructose, and red/processed meats). Avoid sugar-sweetened beverages and high-fructose corn syrup.'); pLines.push('- Weight reduction ≥10% of body weight.'); pLines.push('- Recommend at least 150 minutes per week of moderate-intensity aerobic physical activity + resistance training.'); if (drinksAlc) pLines.push('- Alcohol abstinence.'); if (subtype === 'severe') { pLines.push('- Refer to Gastroenterologist/Hepatologist for further evaluation.'); pLines.push('- Consider Fibroscan or liver biopsy to assess fibrosis stage.'); pLines.push('- Repeat LFT and Ultrasound liver in 3-6 months.'); } else if (subtype === 'moderate') { pLines.push('- Repeat LFT and Ultrasound liver in 6 months.'); } else { pLines.push('- Follow-up Ultrasound liver in 6-12 months.'); } }
    else if (a === 'Anemia') { const subtype = state.assessSubtypes['Anemia'] || 'none'; displayTitle = 'Anemia' + getSubtypeLabel('Anemia', subtype); pLines.push('- Evaluate for underlying causes: nutritional deficiency, chronic disease, blood loss, hemolysis, bone marrow disorders.'); if (subtype === 'microcytic') { pLines.push('- Likely Iron Deficiency Anemia: Check serum ferritin, serum iron, TIBC.'); pLines.push('- Investigate source of blood loss (GI endoscopy/colonoscopy if indicated, especially in men and postmenopausal women).'); pLines.push('- Consider trial of oral iron supplementation (e.g., ferrous sulfate 325 mg daily) with follow-up CBC in 4-8 weeks.'); pLines.push('- If thalassemia suspected (based on ethnicity/family history), check hemoglobin electrophoresis.'); } else if (subtype === 'normocytic') { pLines.push('- Consider Anemia of Chronic Disease, early iron deficiency, chronic kidney disease, or mixed etiology.'); pLines.push('- Check reticulocyte count, serum ferritin, serum iron, TIBC, BUN/Cr.'); pLines.push('- If no obvious cause, consider referral to hematologist for further evaluation.'); } else if (subtype === 'macrocytic') { pLines.push('- Check vitamin B12 and folate levels.'); pLines.push('- Evaluate for alcohol use, liver disease, hypothyroidism, or medication-induced causes.'); pLines.push('- If B12/folate deficiency confirmed, initiate replacement therapy and monitor response.'); } else { pLines.push('- Check reticulocyte count, serum ferritin, serum iron, TIBC, vitamin B12, and folate levels.'); pLines.push('- Further workup guided by MCV and clinical context.'); } }
    else if (a === 'Microscopic Hematuria') { pLines.push('- Repeat UA in 48–72 hours after resolving benign transient causes.'); pLines.push('- Refer urologist if UA still shows microscopic hematuria.'); }
    else if (a === 'Asymptomatic Bacteriuria') { pLines.push('- Healthy, non-pregnant women: asymptomatic — no dysuria, frequency, urgency, suprapubic pain, flank pain, or fever.'); pLines.push('- No treatment required.'); }
    else if (a === 'Proteinuria') { pLines.push('- Recheck UA next 1-2 weeks.'); }
    assessPlanList.push({ title: displayTitle, plans: pLines });
  });

  if (assessPlanList.length > 0) { text += `Assessment and Plan\n`; assessPlanList.forEach((item, i) => { text += `${i + 1}. ${item.title}\n`; if (item.plans.length > 0) { text += `   Plan\n`; item.plans.forEach(p => { text += `   ${p}\n`; }); } }); text += '\n'; }

  let genPlanText = '';
  let lifeArr = [];
  if (state.life.diet) lifeArr.push('- Diet (e.g., Low salt, Low fat, Diabetic diet)');
  if (state.life.ex) lifeArr.push('- Exercise (Recommend ≥150 min/wk aerobic + resistance)');
  if (state.life.weight) lifeArr.push('- Weight management / Stop smoking or alcohol');
  if (lifeArr.length > 0) genPlanText += `General Lifestyle Modification:\n${lifeArr.join('\n')}\n\n`;
  const invPlan = getVal('pl-inv'); if (invPlan) genPlanText += `Further Investigations: ${invPlan}\n\n`;
  let fuArr = [];
  if (getSel('btn-fu1')) fuArr.push('Routine Annual Check-up next year');
  const fu2 = getVal('pl-fu'); if (getSel('btn-fu2')) fuArr.push(`F/U for abnormal results in: ${fu2 || '___'}`);
  if (fuArr.length > 0) genPlanText += `Follow-up (F/U):\n${fuArr.map(x => '- ' + x).join('\n')}\n`;
  if (genPlanText) text += `Further Plan & Follow-up\n${genPlanText}`;

  document.getElementById('out-text').textContent = text.trim();
  
  // Build patient advice
  const adviceData = buildPatientAdvice(asSet, drinksAlc);
  renderPatientAdvice(adviceData);
  
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-output').style.display = 'block';
  switchTab('medical');
  window.scrollTo(0,0);
}

function showForm() {
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('view-output').style.display = 'none';
}

function copyOutput(btn, sourceId) {
  const text = document.getElementById(sourceId).textContent;
  navigator.clipboard.writeText(text);
  btn.textContent = 'COPIED ✓';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'COPY TEXT'; btn.classList.remove('ok'); }, 1500);
}

// Init
updatePMH('none'); updateFH(); updateSmoke('never'); updateAlc('none'); updateEx('none'); updateAllergy('none'); updateLife();
initImaging(); updateImgSel(); updateAssessPresets(); renderSubtypes();
</script>
